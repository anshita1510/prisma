<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2720;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1814;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#e8e4dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a7060;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect x="0" y="0" width="100" height="100" rx="20" ry="20" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight on top edge -->
  <rect x="0" y="0" width="100" height="50" rx="20" ry="20" fill="rgba(255,255,255,0.03)"/>

  <!-- P shape: left vertical stem -->
  <rect x="20" y="16" width="15" height="68" rx="3" fill="url(#pGrad)" filter="url(#softShadow)"/>

  <!-- P shape: top bowl (rounded rectangle forming the bump) -->
  <path
    d="M35 16 L58 16 Q78 16 78 36 Q78 56 58 56 L35 56 L35 44 L56 44 Q64 44 64 36 Q64 28 56 28 L35 28 Z"
    fill="url(#pGrad)"
    filter="url(#softShadow)"
  />

  <!-- Wave / curl cutout on the stem — the signature detail -->
  <path
    d="M20 46 C26 46 29 52 26 58 C23 64 20 64 20 64"
    stroke="#1a1814"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
  />
  <!-- Second wave highlight -->
  <path
    d="M20 46 C26 46 29 52 26 58 C23 64 20 64 20 64"
    stroke="rgba(255,255,255,0.08)"
    stroke-width="1.5"
    fill="none"
    stroke-linecap="round"
  />
</svg>
