<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Project Creation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Frontend-Backend Connection Debugger</h1>
        
        <div class="section">
            <h2>Step 1: Test Backend Connection</h2>
            <button onclick="testBackendConnection()">Test Backend Connection</button>
            <div id="connectionResult"></div>
        </div>

        <div class="section">
            <h2>Step 2: Test Authentication</h2>
            <input type="email" id="email" placeholder="Email" value="admin@company.com">
            <input type="password" id="password" placeholder="Password" value="admin123">
            <button onclick="testLogin()">Test Login</button>
            <div id="loginResult"></div>
        </div>

        <div class="section">
            <h2>Step 3: Test Project Creation</h2>
            <input type="text" id="projectName" placeholder="Project Name" value="Debug Test Project">
            <textarea id="projectDescription" placeholder="Project Description">Testing frontend-backend connection</textarea>
            <button onclick="testProjectCreation()">Test Project Creation</button>
            <div id="projectResult"></div>
        </div>

        <div class="section">
            <h2>Step 4: Check Local Storage</h2>
            <button onclick="checkLocalStorage()">Check Local Storage</button>
            <div id="storageResult"></div>
        </div>

        <div class="section">
            <h2>Step 5: Test Available Employees</h2>
            <button onclick="testAvailableEmployees()">Test Available Employees</button>
            <div id="employeesResult"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5004';
        let authToken = null;

        function showResult(elementId, content, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.innerHTML = content;
            element.className = isSuccess ? 'success' : 'error';
        }

        async function testBackendConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/users/login`, {
                    method: 'OPTIONS'
                });
                showResult('connectionResult', '✅ Backend is reachable!');
            } catch (error) {
                showResult('connectionResult', `❌ Backend connection failed: ${error.message}`, false);
            }
        }

        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                    showResult('loginResult', `✅ Login successful!<br>
                        <strong>User:</strong> ${data.user.name}<br>
                        <strong>Role:</strong> ${data.user.role}<br>
                        <strong>Employee ID:</strong> ${data.user.employeeId}<br>
                        <strong>Token:</strong> ${authToken.substring(0, 50)}...`);
                } else {
                    showResult('loginResult', `❌ Login failed: ${data.message}`, false);
                }
            } catch (error) {
                showResult('loginResult', `❌ Login error: ${error.message}`, false);
            }
        }

        async function testProjectCreation() {
            if (!authToken) {
                showResult('projectResult', '❌ Please login first!', false);
                return;
            }

            const projectName = document.getElementById('projectName').value;
            const projectDescription = document.getElementById('projectDescription').value;

            const projectData = {
                name: projectName,
                description: projectDescription,
                companyId: 2,
                departmentId: 2,
                ownerId: 21, // This should be dynamic based on logged-in user
                status: 'PLANNING'
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/project-management`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(projectData)
                });

                const data = await response.json();
                
                if (data.success) {
                    showResult('projectResult', `✅ Project created successfully!<br>
                        <strong>Project ID:</strong> ${data.data.id}<br>
                        <strong>Project Code:</strong> ${data.data.code}<br>
                        <strong>Project Name:</strong> ${data.data.name}<br>
                        <strong>Owner:</strong> ${data.data.owner.name}<br>
                        <pre>${JSON.stringify(data.data, null, 2)}</pre>`);
                } else {
                    showResult('projectResult', `❌ Project creation failed: ${data.message}<br>
                        <strong>Errors:</strong> ${data.errors ? data.errors.join(', ') : 'None'}`, false);
                }
            } catch (error) {
                showResult('projectResult', `❌ Project creation error: ${error.message}`, false);
            }
        }

        function checkLocalStorage() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            let result = '<strong>Local Storage Contents:</strong><br>';
            result += `<strong>Token:</strong> ${token ? token.substring(0, 50) + '...' : 'Not found'}<br>`;
            result += `<strong>User:</strong> ${user || 'Not found'}<br>`;
            
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    result += `<strong>Token Payload:</strong><pre>${JSON.stringify(payload, null, 2)}</pre>`;
                } catch (e) {
                    result += '<strong>Token:</strong> Invalid format<br>';
                }
            }
            
            showResult('storageResult', result);
        }

        async function testAvailableEmployees() {
            if (!authToken) {
                showResult('employeesResult', '❌ Please login first!', false);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/project-management/utils/available-employees?companyId=2`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const data = await response.json();
                
                if (data.success) {
                    let result = `✅ Found ${data.data.length} available employees:<br>`;
                    data.data.forEach(emp => {
                        result += `• ${emp.name} (${emp.designation}) - ${emp.employeeCode}<br>`;
                    });
                    showResult('employeesResult', result);
                } else {
                    showResult('employeesResult', `❌ Failed to fetch employees: ${data.message}`, false);
                }
            } catch (error) {
                showResult('employeesResult', `❌ Employees fetch error: ${error.message}`, false);
            }
        }

        // Auto-check local storage on page load
        window.onload = function() {
            checkLocalStorage();
            const token = localStorage.getItem('token');
            if (token) {
                authToken = token;
            }
        };
    </script>
</body>
</html>
