<!DOCTYPE html>
<html>
<head>
    <title>Test API Connection</title>
</head>
<body>
    <h1>Test API Connection</h1>
    <button onclick="testConnection()">Test Backend Connection</button>
    <button onclick="testApprove()">Test Approve Leave</button>
    <div id="results"></div>

    <script>
        async function testConnection() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing connection...</p>';
            
            try {
                const response = await fetch('http://localhost:5004/api/leaves', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sZSI6IlNVUEVSX0FETUlOIiwiZW1haWwiOiJzaW5nbGFkZWVwYWs1MTlAZ21haWwuY29tIiwidHlwZSI6ImF1dGgiLCJpYXQiOjE3NjgzMDA2NzgsImV4cCI6MTc2ODkwNTQ3OH0.KLo4lyHf93cn5e7saRN_E0SxxzLAoK46wIfNvfSdPpo',
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                results.innerHTML = `
                    <h3>✅ Connection Success!</h3>
                    <p>Status: ${response.status}</p>
                    <p>Leaves found: ${data.leaves?.length || 0}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `
                    <h3>❌ Connection Failed!</h3>
                    <p>Error: ${error.message}</p>
                `;
            }
        }

        async function testApprove() {
            const results = document.getElementById('results');
            results.innerHTML = '<p>Testing approve functionality...</p>';
            
            try {
                const response = await fetch('http://localhost:5004/api/leaves/17/status', {
                    method: 'PATCH',
                    headers: {
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sZSI6IlNVUEVSX0FETUlOIiwiZW1haWwiOiJzaW5nbGFkZWVwYWs1MTlAZ21haWwuY29tIiwidHlwZSI6ImF1dGgiLCJpYXQiOjE3NjgzMDA2NzgsImV4cCI6MTc2ODkwNTQ3OH0.KLo4lyHf93cn5e7saRN_E0SxxzLAoK46wIfNvfSdPpo',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'REJECTED' })
                });
                
                const data = await response.json();
                results.innerHTML = `
                    <h3>✅ Approve Test Success!</h3>
                    <p>Status: ${response.status}</p>
                    <p>Response: ${data.message}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                results.innerHTML = `
                    <h3>❌ Approve Test Failed!</h3>
                    <p>Error: ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
