<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Leave Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .success { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        .leave-item { border: 1px solid #ddd; margin: 10px 0; padding: 10px; border-radius: 5px; }
        .pending { border-left: 4px solid #ffc107; }
        .approved { border-left: 4px solid #28a745; }
        .rejected { border-left: 4px solid #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Leave Management Test</h1>
        
        <div class="section">
            <h2>1. Authentication</h2>
            <button onclick="testLogin()">Login as Admin</button>
            <button onclick="checkAuth()">Check Auth Status</button>
            <button onclick="clearAuth()">Clear Auth</button>
            <div id="auth-status"></div>
        </div>
        
        <div class="section">
            <h2>2. Load Leaves</h2>
            <button onclick="loadLeaves()">Load All Leaves</button>
            <div id="leaves-status"></div>
            <div id="leaves-list"></div>
        </div>
        
        <div class="section">
            <h2>3. Test Actions</h2>
            <div id="actions-area"></div>
        </div>
        
        <div class="section">
            <h2>4. Debug Info</h2>
            <button onclick="showDebugInfo()">Show Debug Info</button>
            <div id="debug-info"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5004';
        let currentLeaves = [];

        function log(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            element.innerHTML = `<div class="${className}">${message}</div>`;
        }

        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            if (!token) {
                throw new Error('No authentication token found');
            }
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        async function testLogin() {
            try {
                log('auth-status', 'Logging in...', 'info');
                
                const response = await fetch(`${API_BASE_URL}/api/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'singladeepak519@gmail.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    log('auth-status', `✅ Login successful! User: ${data.user.name} (${data.user.role})`, 'success');
                } else {
                    log('auth-status', `❌ Login failed: ${data.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log('auth-status', `❌ Login error: ${error.message}`, 'error');
            }
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                const userData = JSON.parse(user);
                log('auth-status', `✅ Authenticated as: ${userData.name} (${userData.role})`, 'success');
            } else {
                log('auth-status', '❌ Not authenticated', 'error');
            }
        }

        function clearAuth() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            log('auth-status', '🗑️ Authentication cleared', 'info');
        }

        async function loadLeaves() {
            try {
                log('leaves-status', 'Loading leaves...', 'info');
                
                const headers = getAuthHeaders();
                const response = await fetch(`${API_BASE_URL}/api/leaves`, {
                    method: 'GET',
                    headers
                });
                
                const data = await response.json();
                
                if (data.success && data.leaves) {
                    currentLeaves = data.leaves;
                    log('leaves-status', `✅ Loaded ${data.leaves.length} leaves`, 'success');
                    displayLeaves(data.leaves);
                    createActionButtons();
                } else {
                    log('leaves-status', `❌ Failed to load leaves: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log('leaves-status', `❌ Load leaves error: ${error.message}`, 'error');
            }
        }

        function displayLeaves(leaves) {
            const container = document.getElementById('leaves-list');
            container.innerHTML = '';
            
            leaves.forEach(leave => {
                const div = document.createElement('div');
                div.className = `leave-item ${leave.status.toLowerCase()}`;
                div.innerHTML = `
                    <strong>ID: ${leave.id}</strong> - ${leave.type} Leave
                    <br><strong>Employee:</strong> ${leave.employee?.name || 'Unknown'}
                    <br><strong>Dates:</strong> ${new Date(leave.startDate).toLocaleDateString()} - ${new Date(leave.endDate).toLocaleDateString()}
                    <br><strong>Status:</strong> ${leave.status}
                    <br><strong>Reason:</strong> ${leave.reason || 'No reason provided'}
                    ${leave.approvedBy ? `<br><strong>Approved by:</strong> ${leave.approvedBy}` : ''}
                `;
                container.appendChild(div);
            });
        }

        function createActionButtons() {
            const container = document.getElementById('actions-area');
            container.innerHTML = '';
            
            const pendingLeaves = currentLeaves.filter(leave => leave.status === 'PENDING');
            
            if (pendingLeaves.length === 0) {
                container.innerHTML = '<p>No pending leaves to test with.</p>';
                return;
            }
            
            pendingLeaves.forEach(leave => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <p><strong>Leave ID ${leave.id}</strong> (${leave.employee?.name || 'Unknown'} - ${leave.type})</p>
                    <button onclick="approveLeave(${leave.id})">✅ Approve</button>
                    <button onclick="rejectLeave(${leave.id})">❌ Reject</button>
                `;
                container.appendChild(div);
            });
        }

        async function approveLeave(leaveId) {
            try {
                console.log('🟢 Approving leave ID:', leaveId);
                
                const headers = getAuthHeaders();
                const response = await fetch(`${API_BASE_URL}/api/leaves/${leaveId}/status`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ status: 'APPROVED' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    log('leaves-status', `✅ Leave ${leaveId} approved successfully!`, 'success');
                    loadLeaves(); // Refresh the list
                } else {
                    log('leaves-status', `❌ Failed to approve leave ${leaveId}: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log('leaves-status', `❌ Approve error: ${error.message}`, 'error');
            }
        }

        async function rejectLeave(leaveId) {
            try {
                console.log('🔴 Rejecting leave ID:', leaveId);
                
                const headers = getAuthHeaders();
                const response = await fetch(`${API_BASE_URL}/api/leaves/${leaveId}/status`, {
                    method: 'PATCH',
                    headers,
                    body: JSON.stringify({ status: 'REJECTED' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    log('leaves-status', `✅ Leave ${leaveId} rejected successfully!`, 'success');
                    loadLeaves(); // Refresh the list
                } else {
                    log('leaves-status', `❌ Failed to reject leave ${leaveId}: ${data.error || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log('leaves-status', `❌ Reject error: ${error.message}`, 'error');
            }
        }

        function showDebugInfo() {
            const debugInfo = {
                'API Base URL': API_BASE_URL,
                'Token exists': !!localStorage.getItem('token'),
                'Token preview': localStorage.getItem('token')?.substring(0, 50) + '...',
                'User data': localStorage.getItem('user'),
                'Current leaves count': currentLeaves.length,
                'Browser': navigator.userAgent,
                'Current URL': window.location.href
            };
            
            document.getElementById('debug-info').innerHTML = `<pre>${JSON.stringify(debugInfo, null, 2)}</pre>`;
        }

        // Auto-check auth status on load
        window.onload = function() {
            checkAuth();
        };
    </script>
</body>
</html>
